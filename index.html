<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DailyLift — Choose how you're feeling and receive a warm, personalized affirmation." />

    <title>DailyLift — A little light for your day</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>

  <body>
    <!-- Screen reader live region for dynamic announcements -->
    <div aria-live="polite" aria-atomic="true" class="live-region" id="sr-announcer"></div>

    <div class="page-wrapper">

      <!-- ── Hero Band: Header + Daily Banner share one background ── -->
      <div class="hero-band">
        <div class="site-header__orb site-header__orb--1" aria-hidden="true"></div>
        <div class="site-header__orb site-header__orb--2" aria-hidden="true"></div>
        <div class="site-header__orb site-header__orb--3" aria-hidden="true"></div>

        <header class="site-header" role="banner">
          <div class="site-header__inner">
            <h1 class="site-logo">Daily<span>Lift</span></h1>
            <p class="site-tagline">A little light for your day.</p>
          </div>
        </header>

        <!-- ── Daily Affirmation Banner ───────────────────────── -->
        <section
          class="daily-banner"
          aria-label="Today's featured affirmation"
          id="daily"
        >
          <div class="daily-banner__inner">
            <p class="daily-banner__label" aria-hidden="true">
              <svg class="daily-banner__label-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="12" cy="12" r="4" fill="currentColor"/>
                <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Today's Affirmation
            </p>
            <blockquote class="daily-banner__text" id="daily-affirmation-text">
              <!-- Populated by daily-affirmation.js -->
            </blockquote>
          </div>
        </section>
      </div><!-- /.hero-band -->

      <main id="main-content">

        <!-- ── Mood Selector ────────────────────────────────── -->
        <section class="section--light" id="mood" aria-labelledby="mood-heading">
          <div class="container">
            <h2 class="section-heading" id="mood-heading">How are you feeling?</h2>
            <p class="section-subheading">
              Choose your mood and receive an affirmation written just for this moment.
            </p>

            <!-- Mood grid — pre-rendered to prevent CLS; JS adds interactivity -->
            <div
              class="mood-selector"
              role="group"
              aria-label="Mood options"
              id="mood-selector"
            >
              <button type="button" class="mood-btn" data-mood="angry" aria-pressed="false" style="--mood-color: var(--mood-angry)" tabindex="0">

                <span class="mood-btn__label">Angry</span>
              </button>
              <button type="button" class="mood-btn" data-mood="sad" aria-pressed="false" style="--mood-color: var(--mood-sad)" tabindex="-1">

              <button type="button" class="mood-btn" data-mood="frustrated" aria-pressed="false" style="--mood-color: var(--mood-frustrated)" tabindex="-1">

              <button type="button" class="mood-btn" data-mood="anxious" aria-pressed="false" style="--mood-color: var(--mood-anxious)" tabindex="-1">

              </button>

                <span class="mood-btn__label">Happy</span>
              </button>
              <button type="button" class="mood-btn" data-mood="lonely" aria-pressed="false" style="--mood-color: var(--mood-lonely)" tabindex="-1">
                <span class="mood-btn__emoji" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M178,36a65.6,65.6,0,0,0-46.67,19.33L128,58.66l-3.33-3.33A66,66,0,0,0,12,102c0,72.34,105.81,130.14,110.31,132.57a12,12,0,0,0,11.38,0C138.19,232.14,244,174.34,244,102A66.08,66.08,0,0,0,178,36Zm-5.49,142.36A328.69,328.69,0,0,1,128,210.16a328.69,328.69,0,0,1-44.51-31.8C61.82,159.77,36,131.42,36,102a42,42,0,0,1,71.7-29.7L111,75.63l-7.52,7.52a12,12,0,0,0,0,17l21.7,21.7-13.7,13.69a12,12,0,1,0,17,17l22.18-22.19a12,12,0,0,0,0-17L129,91.63,148.3,72.3A42,42,0,0,1,220,102C220,131.42,194.18,159.77,172.51,178.36Z"/></svg></span>
                <span class="mood-btn__label">Lonely</span>
              </button>
              <button type="button" class="mood-btn" data-mood="overwhelmed" aria-pressed="false" style="--mood-color: var(--mood-overwhelmed)" tabindex="-1">
                <span class="mood-btn__emoji" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M128,20A108,108,0,1,0,236,128,108.12,108.12,0,0,0,128,20Zm0,192a84,84,0,1,1,84-84A84.09,84.09,0,0,1,128,212Zm56.49-92.49a12,12,0,0,1-17,17L162,131l-5.51,5.52a12,12,0,0,1-17-17L145,114l-5.52-5.51a12,12,0,0,1,17-17L162,97l5.51-5.52a12,12,0,0,1,17,17L179,114Zm-68,17a12,12,0,0,1-17,0L94,131l-5.51,5.52a12,12,0,0,1-17-17L77,114l-5.52-5.51a12,12,0,0,1,17-17L94,97l5.51-5.52a12,12,0,0,1,17,17L111,114l5.52,5.51A12,12,0,0,1,116.49,136.49ZM144,180a16,16,0,1,1-16-16A16,16,0,0,1,144,180Z"/></svg></span>
                <span class="mood-btn__label">Overwhelmed</span>
              </button>
              <button type="button" class="mood-btn" data-mood="tired" aria-pressed="false" style="--mood-color: var(--mood-tired)" tabindex="-1">
                <span class="mood-btn__emoji" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M236.37,139.4a12,12,0,0,0-12-3A84.07,84.07,0,0,1,119.6,31.59a12,12,0,0,0-15-15A108.86,108.86,0,0,0,49.69,55.07,108,108,0,0,0,136,228a107.09,107.09,0,0,0,64.93-21.69,108.86,108.86,0,0,0,38.44-54.94A12,12,0,0,0,236.37,139.4Zm-49.88,47.74A84,84,0,0,1,68.86,69.51,84.93,84.93,0,0,1,92.27,48.29Q92,52.13,92,56A108.12,108.12,0,0,0,200,164q3.87,0,7.71-.27A84.79,84.79,0,0,1,186.49,187.14Z"/></svg></span>
                <span class="mood-btn__label">Tired</span>
              </button>
              <button type="button" class="mood-btn" data-mood="hopeful" aria-pressed="false" style="--mood-color: var(--mood-hopeful)" tabindex="-1">

                <span class="mood-btn__label">Hopeful</span>
              </button>
              <button type="button" class="mood-btn" data-mood="grateful" aria-pressed="false" style="--mood-color: var(--mood-grateful)" tabindex="-1">
                <span class="mood-btn__emoji" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor" aria-hidden="true"><path d="M238.15,177.18l-35.53-35.53L166.45,22.3A25.75,25.75,0,0,0,128,8,25.75,25.75,0,0,0,89.55,22.3L53.38,141.65,17.85,177.18a20,20,0,0,0,0,28.28l32.69,32.69a20,20,0,0,0,28.28,0l48.29-48.28c.31-.31.6-.62.89-.94.29.32.58.63.89.94l48.29,48.28a20,20,0,0,0,28.28,0l32.69-32.69A20,20,0,0,0,238.15,177.18ZM64.68,218.35l-27-27,11-11,27,27ZM116,158.75a19.85,19.85,0,0,1-5.86,14.14L92.68,190.35l-27-27,6.83-6.83a11.94,11.94,0,0,0,3-5l37-122.23a1.78,1.78,0,0,1,3.48.52Zm47.5,31.78-17.64-17.64A19.85,19.85,0,0,1,140,158.75v-129a1.78,1.78,0,0,1,3.48-.52l37,122.23a11.94,11.94,0,0,0,3,5l7.6,7.6Zm27.82,27.82-10.85-10.84,27.63-26.44,10.25,10.25Z"/></svg></span>
                <span class="mood-btn__label">Grateful</span>
              </button>
            </div>
          </div>
        </section>

        <!-- ── Affirmation Display ───────────────────────────── -->
        <section class="affirmation-section section--lavender" id="affirmation" aria-labelledby="affirmation-heading">
          <div class="container container--content">
            <h2 class="sr-only" id="affirmation-heading">Your affirmation</h2>

            <div class="affirmation-slot">

              <div class="affirmation-card-wrapper" id="affirmation-card-wrapper" aria-hidden="true">
                <article class="affirmation-card" id="affirmation-card">

                  <p class="affirmation-card__mood" id="affirmation-mood-label" aria-hidden="true">
                    <span class="affirmation-card__mood-dot"></span>
                    <span id="affirmation-mood-text"></span>
                  </p>

                  <p class="affirmation-card__text" id="affirmation-text" aria-live="polite">
                    <!-- Populated by affirmation-display.js -->
                  </p>

                  <button
                    type="button"
                    class="affirmation-card__refresh"
                    id="refresh-affirmation"
                    aria-label="Get a different affirmation"
                  >
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                      <path d="M1 4v6h6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M23 20v-6h-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Try another
                  </button>
                </article>
              </div>

              <!-- Empty state — shown before mood is selected -->
              <div class="affirmation-empty-state affirmation-card-wrapper is-ready is-visible" id="affirmation-empty-state" aria-hidden="false">
                <div class="affirmation-empty-state__icon" aria-hidden="true">
                  <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                    <circle cx="12" cy="12" r="4" fill="currentColor" opacity="0.6"/>
                    <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </div>
                <p class="affirmation-empty-state__heading">Choose how you're feeling</p>
                <p class="affirmation-empty-state__sub">Your personal affirmation is waiting above.</p>
              </div>

            </div><!-- /.affirmation-slot -->
          </div>
        </section>

      </main>

      <!-- ── Site Footer ──────────────────────────────────────── -->
      <footer class="site-footer" role="contentinfo">
        <div class="container">
          <p>Built with care &amp; a little sunshine.</p>
        </div>
      </footer>

    </div><!-- /.page-wrapper -->

    <!-- JS entry point -->
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
